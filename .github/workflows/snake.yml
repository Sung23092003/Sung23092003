name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      # 2. Generate snake
      - name: 🐍 Generate Snake Animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/snake-light.svg
            dist/snake-dark.svg?palette=github-dark

            # 🔥 Neon style (xịn)
            dist/snake-neon.svg?color_snake=#00f7ff&color_dots=#001f3f,#003566,#00509d,#0077b6,#00b4d8

            # 🌊 Ocean style
            dist/snake-ocean.svg?color_snake=#00c3ff&color_dots=#e0f7ff,#b3ecff,#80deea,#4dd0e1,#26c6da

            # 🔥 Fire style
            dist/snake-fire.svg?color_snake=#ff6a00&color_dots=#fff3e0,#ffe0b2,#ffcc80,#ffb74d,#ff9800

            # 🎬 Animated gif (siêu nổi)
            dist/snake.gif

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Deploy
      - name: 🚀 Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "🔥 Update snake animations"
